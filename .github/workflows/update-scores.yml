name: Update Match Scores

on:
  schedule:
    - cron: '*/10 * * * *'  # every 30 minutes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch and update scores
        run: node scripts/update-scores.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/matches/index.json
          git diff --staged --quiet || git commit -m "chore: sync match scores"
          git push
